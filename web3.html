<!DOCTYPE html>

<html>
    <title>Login or signup</title>
    <link rel="stylesheet" href="web3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</html>

<body>
<div class="wrapper active">

    <div class="overlay-box">
        <div class="overlay-right">
            <h2 id="login-h">Welcome Back!</h2>
            <p id="login-p">Don't have an account?</p>
            <button class="ghost" id="login-b">Sign Up</button>
        </div>
        <div class="overlay-left">  
            <h2 id="signin-h">Hello , there!</h2>
            <p id="signin-p">Already have an account?</p>
            <button class="ghost" id="signin-b">Login</button>
        </div>
    </div>

    <div class="login">
         <form action="">
            <h1>Login</h1>
            <div class="input-box">
                 <input type="text" placeholder="Username" required>
                 <i class="fa-solid fa-user"></i>

           </div> 

         <div class="input-box">
             <input type="password" placeholder="password" 
             required>
                <i class="fa-solid fa-lock"></i>
             </div>

            <div class="remember-forgot">
             <label><input type="checkbox"> Remember me 
               </label>
               <a href="#">Forgot password?</a>
                    </div>

                <button type="submit" class="login-btn" href="google.com">Login</button>

           </form>
        

    </div>



    <div class="signup">
        <form action="">
        <div>
                <h1>Get started </h1>
            </div>
            <div class="input">
                <input type="text" placeholder="Username" required>
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input">
                <input type="email" placeholder="Email Address" required>
                <i class="fa-solid fa-envelope"></i>
            </div>
            <div class="input">
                <input type="password" placeholder="New password" required>
                <i class="fa-solid fa-lock"></i>
            </div>


            <div class="checkbox">
                 <input type="checkbox" id="terms">
                 <label for="terms">
                    <p>I have Accepted <a href="#" >Terms & Conditions </a></p></label>
            </div>

            <div>
                <button type="submit" class="signup-btn">Signup</button>
            </div>

            </form>

    </div>
 

</div>

<div class="main-container" id="main">


</div>


<script>
    const wrapper = document.querySelector('.wrapper');
    
    const signupBtn = document.getElementById('login-b'); 
    
  
    const loginBtn = document.getElementById('signin-b');

signupBtn.addEventListener('click', () => {
        console.log("Adding active class");
        wrapper.classList.add('active');
    });

    // When clicking Login button
    loginBtn.addEventListener('click', () => {
        console.log("Removing active class");
        wrapper.classList.remove('active');
    });


</script>

</body>
